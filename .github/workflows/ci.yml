name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check index.html exists
        run: test -f index.html

      - name: Check JS syntax
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');
            const match = html.match(/<script>([\s\S]*?)<\/script>/);
            if (!match) { console.error('No script tag found'); process.exit(1); }
            new Function(match[1]);
            console.log('JS syntax OK');
          "

      - name: Validate HTML structure
        run: |
          grep -q '<!DOCTYPE html>' index.html || (echo "Missing DOCTYPE" && exit 1)
          grep -q '<canvas' index.html || (echo "Missing canvas element" && exit 1)
          grep -q 'image/jpeg' index.html || (echo "Missing JPEG export" && exit 1)
          echo "HTML structure OK"
